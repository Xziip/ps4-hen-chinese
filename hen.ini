[HEN]
; 配置版本 - 更改此值将触发设置文件覆写。
; 如果此字段之前不存在，将写入此设置文件。
config_version = 3

; 启用漏洞修复 - 自动重新应用任何缺失/失败/不正确的补丁，
; 这些补丁应该由漏洞设置。这有助于在越狱后保持系统稳定性，
; 确保内核在不同的漏洞和固件版本中得到一致的补丁。
; 值：0 = 禁用，1 = 启用
; 默认：1
exploit_fixes = 1

; 启用内存映射补丁以解密二进制文件。这些补丁允许系统
; 正确处理加密的可执行文件和库。
; 值：0 = 禁用，1 = 启用
; 默认：1
mmap_patches = 1

; 通过卸载 `/update` 分区来阻止主机固件更新。
; 这可以防止意外的固件更新，避免漏洞被修补。
; 值：0 = 允许更新，1 = 阻止更新
; 默认：1
block_updates = 1

; 禁用用户空间 ASLR（地址空间布局随机化）
; ASLR 随机化内存地址以防止漏洞利用。禁用它可以提高与
; 自制应用程序、调试器和作弊器的兼容性。
; 值：0 = 保持 ASLR 启用，1 = 禁用 ASLR
; 默认：1
disable_aslr = 1

; NoBD（无蓝光驱动器）补丁 - 允许在蓝光驱动器损坏的情况下
; 进行系统更新。
; 值：0 = 跳过 NoBD 补丁，1 = 应用 NoBD 补丁
; 默认：0
nobd_patches = 0

; Target ID 欺骗器 - 更改主机报告的 Target ID，用于开发
; 或特定区域功能。
;
; 有效的 Target ID：
;   0x80 = 诊断版
;   0x81 = 开发机
;   0x82 = 测试机
;   0x83 = 日本
;   0x84 = 美国
;   0x85 = 欧洲
;   0x86 = 韩国
;   0x87 = 英国
;   0x88 = 墨西哥
;   0x89 = 澳大利亚和新西兰
;   0x8A = 南亚
;   0x8B = 台湾
;   0x8C = 俄罗斯
;   0x8D = 中国
;   0x8E = 香港
;   0x8F = 巴西
;   0xA0 = Kratos（街机柜）
;
; 值：0 = 不欺骗，或有效的十六进制 Target ID（例如 0x84）
; 默认：0
target_id = 0

; 跳过应用 SceShellCore、SceShellUI 和 RemotePlay 补丁
; 对测试机用户有用
; 值：0 = 应用补丁，1 = 跳过补丁
; 默认：0
skip_patches = 0

; 将默认的 HEN 插件 PRX 文件写入主机硬盘。
; 此选项控制是否在初始化期间自动将内置的 HEN 插件文件（PRX 模块）
; 写入系统内部存储。建议首次设置时启用此选项。
; 值：0 = 不写入插件，1 = 将插件写入硬盘
; 默认：1
upload_prx = 1

; 启用 HEN 插件文件加载和执行系统
; 此功能激活插件子系统，允许加载额外的 PRX 模块以扩展 HEN 的功能。
; 插件可以提供自制程序支持、游戏补丁、系统修改和其他高级功能。
; 启用后，HEN 将扫描并从系统存储加载兼容的插件文件。
; 值：0 = 不启用插件，1 = 启用插件
; 默认：1
enable_plugins = 1

